version: '3.8'

services:
  web:
    build: .
    container_name: prediksi_daster_web_local
    ports:
      - "8098:80"
    volumes:
      - ./:/var/www/html # Mengarahkan folder root lokal Anda ke dalam web server
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: prediksi_daster_db_local
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: prediksi_daster_collection
      MYSQL_USER: prediksi_daster_user
      MYSQL_PASSWORD: userpassword
    volumes:
      - db_data:/var/lib/mysql # Menyimpan data database agar tidak hilang saat Docker dimatikan

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: prediksi_daster_pma_local
    ports:
      - "8099:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db

volumes:
  db_data:
